name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: python -m pip install --upgrade pip
      - run: pip install ruff==0.8.6
      - run: ruff check foodanalyzer tests

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: pip install mypy==1.14.1
      - run: mypy foodanalyzer --ignore-missing-imports --check-untyped-defs --follow-imports=skip --disable-error-code unused-ignore

  test:
    name: Tests and coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    env:
      OFFLINE_MODE: "true"
      LOG_LEVEL: INFO
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: pytest --cov=foodanalyzer --cov-fail-under=60 --cov-report=term-missing -p no:cacheprovider
      - run: pytest tests/test_ai_smoke.py -v -p no:cacheprovider

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t foodanalyzer-ci .