services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: foodanalyzer
    ports:
      - "5432:5432"

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:dev@db:5432/foodanalyzer
      OFFLINE_MODE: "true"
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      - db